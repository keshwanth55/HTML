<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }
        .box{
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        input, button{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button{
            background: rgb(1, 1, 70);
            color: rgb(116, 131, 103);
            border: none;
        }
    </style>
</head>
<body>

    <h1>📚 Online Books</h1>

    <div class="box">
        <h2>Home</h2>
        <p>Welcome to our Online Book Store.</p>
        <button>Browse Books</button>
    </div>

    <div class="box">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email" required><br>
            <input type="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
